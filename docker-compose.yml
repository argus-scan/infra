services:

  traefik:
    image: traefik:v3.2
    container_name: argus-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/certs
    networks:
      - argus-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth@file"

  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    container_name: argus-falkordb
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --loadmodule /usr/lib/redis/modules/libfalkordb.so
    volumes:
      - falkordb-data:/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: argus-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - plugins.security.ssl.http.enabled=false
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    container_name: argus-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=${CLICKHOUSE_USER} --password=${CLICKHOUSE_PASSWORD} --query='SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: argus-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: argus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`minio.localhost`)"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  auth-service:
    image: ghcr.io/argus-scan/auth-service:latest
    container_name: argus-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@falkordb:6379/0
      JWT_SECRET: ${JWT_SECRET}
      BCRYPT_COST: "12"
      PORT: "8001"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.service=auth"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"

  scan-orchestrator:
    image: ghcr.io/argus-scan/scan-orchestrator:latest
    container_name: argus-scan-orchestrator
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8002"
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scan-orchestrator.rule=PathPrefix(`/api/v1/scans`)"
      - "traefik.http.routers.scan-orchestrator.service=scan-orchestrator"
      - "traefik.http.services.scan-orchestrator.loadbalancer.server.port=8002"

  cve-enricher:
    image: ghcr.io/argus-scan/cve-enricher:latest
    container_name: argus-cve-enricher
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: nats://nats:4222
      PORT: "8006"
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  port-scanner:
    image: ghcr.io/argus-scan/port-scanner:latest
    container_name: argus-port-scanner
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: nats://nats:4222
      PORT: "8005"
      SCAN_TIMEOUT: "2.0"
      SCAN_CONCURRENCY: "200"
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  asset-discovery:
    image: ghcr.io/argus-scan/asset-discovery:latest
    container_name: argus-asset-discovery
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: nats://nats:4222
      PORT: "8004"
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  asn-correlator:
    image: ghcr.io/argus-scan/asn-correlator:latest
    container_name: argus-asn-correlator
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: nats://nats:4222
      PORT: "8003"
    networks:
      - argus-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/argus-scan/web:latest
    container_name: argus-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_URL: http://auth-service:8001
      SCAN_URL: http://scan-orchestrator:8002
    networks:
      - argus-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  falkordb-data:
  opensearch-data:
  clickhouse-data:
  nats-data:
  minio-data:
  traefik-certs:

networks:
  argus-net:
    driver: bridge
