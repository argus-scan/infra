api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}

providers:
  docker:
    exposedByDefault: false
    network: argus-net
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: WARN

accessLog: {}

metrics:
  prometheus: {}
